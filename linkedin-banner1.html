<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

  body {
    width: 1584px;
    height: 396px;
    overflow: hidden;
    font-family: 'Sora', sans-serif;
  }

  .banner {
    width: 1584px;
    height: 396px;
    background: #080d1a;
    position: relative;
    overflow: hidden;
  }

  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(37, 99, 235, 0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(37, 99, 235, 0.08) 1px, transparent 1px);
    background-size: 70px 70px;
  }

  .orb1 {
    position: absolute;
    top: -180px;
    left: 50%;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(37, 99, 235, 0.22) 0%, transparent 60%);
    border-radius: 50%;
  }

  .orb2 {
    position: absolute;
    top: -100px;
    right: -100px;
    width: 450px;
    height: 450px;
    background: radial-gradient(circle, rgba(99, 57, 255, 0.12) 0%, transparent 60%);
    border-radius: 50%;
  }

  .accent-left {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, transparent 0%, #2563eb 50%, transparent 100%);
  }

  .accent-top {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, #2563eb, transparent 50%);
  }

  .accent-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 20%, rgba(37, 99, 235, 0.5) 50%, transparent 80%);
  }

  /* Content pushed right — profile photo lives bottom-left ~300px */
  .content {
    position: absolute;
    left: 360px;
    top: 0;
    right: 0;
    bottom: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 70px 0 40px;
  }

  .left {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: #2563eb;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  .name {
    font-size: 64px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -0.025em;
    line-height: 1;
    text-shadow: 0 0 60px rgba(37, 99, 235, 0.3);
  }

  .tagline {
    font-size: 18px;
    font-weight: 300;
    color: #94a3b8;
    line-height: 1.5;
  }

  .tagline strong {
    color: #e2e8f0;
    font-weight: 500;
  }

  .right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 14px;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(37, 99, 235, 0.25);
    border-radius: 8px;
    padding: 13px 24px;
    min-width: 300px;
    backdrop-filter: blur(4px);
  }

  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 600;
    color: #ffffff;
    min-width: 80px;
    text-align: right;
  }

  .divider {
    width: 1px;
    height: 28px;
    background: rgba(37, 99, 235, 0.4);
  }

  .stat-label {
    font-size: 14px;
    font-weight: 400;
    color: #64748b;
    letter-spacing: 0.03em;
  }

  .url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: rgba(100, 116, 139, 0.7);
    letter-spacing: 0.06em;
    margin-top: 4px;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="grid"></div>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="accent-left"></div>
  <div class="accent-top"></div>
  <div class="accent-bottom"></div>

  <div class="content">
    <div class="left">
      <div class="eyebrow">Senior Google Ads Specialist</div>
      <div class="name">Christopher Hoole</div>
      <div class="tagline">
        Builder of <strong>A.C.T</strong> — AI-Powered Google Ads Optimisation Platform<br>
        Search &middot; Shopping &middot; Performance Max &middot; Display
      </div>
    </div>

    <div class="right">
      <div class="stat">
        <div class="stat-num">16 yrs</div>
        <div class="divider"></div>
        <div class="stat-label">Google Ads Experience</div>
      </div>
      <div class="stat">
        <div class="stat-num">£50M+</div>
        <div class="divider"></div>
        <div class="stat-label">Total Ad Spend Managed</div>
      </div>
      <div class="stat">
        <div class="stat-num">100+</div>
        <div class="divider"></div>
        <div class="stat-label">Accounts Managed</div>
      </div>
      <div class="url">christopherhoole.com</div>
    </div>
  </div>
</div>
</body>
</html>
