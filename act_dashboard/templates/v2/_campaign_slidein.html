{# Shared Campaign Detail slide-in (800px right-aligned).
   Opened by v2_campaign_slidein.js :: window.openCampaignSlidein(clientId, campaignId). #}
<div class="camp-slidein-overlay" id="campSlideinOverlay"></div>
<div class="camp-slidein" id="campSlidein">
  <div class="camp-slidein__header">
    <div class="camp-slidein__header-left">
      <h3 class="camp-slidein__name" id="campSlideinName">Campaign</h3>
      <div class="camp-slidein__meta" id="campSlideinMeta"></div>
    </div>
    <button class="camp-slidein__close" id="campSlideinClose"><span class="material-symbols-outlined">close</span></button>
  </div>
  <div class="camp-slidein__body" id="campSlideinBody"></div>
</div>
