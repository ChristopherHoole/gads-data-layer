{# Shared Decision Details slide-in panel — used by both Morning Review and Account Level.
   Populated by v2_decision_details.js via openDecisionDetails(item). #}
<div class="act-slidein-overlay" id="slideinOverlay"></div>
<div class="act-slidein" id="slideinPanel">
  <div class="act-slidein__header">
    <h3 id="slideinTitle">Decision Details</h3>
    <button class="act-slidein__close" id="slideinClose"><span class="material-symbols-outlined">close</span></button>
  </div>
  <div class="act-slidein__body" id="slideinBody"></div>
  <div class="act-slidein__footer" id="slideinFooter"></div>
</div>
